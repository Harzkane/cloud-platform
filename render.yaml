services:
  # ── Hono API (Node.js) ────────────────────────────────────
  - type: web
    name: nexgenhost-api
    runtime: node
    region: oregon
    plan: free
    rootDir: apps/api
    buildCommand: npm install && npm run build && npm run prisma:push
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DASHBOARD_URL
        sync: false
      - key: API_URL
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_WEBHOOK_SECRET
        sync: false
      - key: INTERNAL_SECRET
        value: 6da37ed6006c95bb1eecffdbeba4992c279e8181645d522145bf07333e58b832
      - key: CLOUDFLARE_API_TOKEN
        sync: false
      - key: CLOUDFLARE_ZONE_ID
        sync: false
      - key: ORACLE_VM_IP
        sync: false
      - key: BASE_DOMAIN
        sync: false
      - key: API_INTERNAL_SECRET
        value: 6da37ed6006c95bb1eecffdbeba4992c279e8181645d522145bf07333e58b832
      - key: WORKER_DEPLOY_QUEUE
        value: nexgenhost-deployments
