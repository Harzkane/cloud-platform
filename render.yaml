services:
  # ── Hono API (Node.js) ────────────────────────────────────
  - type: web
    name: nexgenhost-api
    runtime: node
    region: oregon            # closest free region; change to frankfurt if needed
    plan: free                # upgrade to starter ($7/mo) for persistent disk
    rootDir: apps/api
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # ── Set these manually in Render Dashboard ────────────
      - key: DATABASE_URL
        sync: false           # paste your Neon connection string
      - key: REDIS_URL
        sync: false           # paste Upstash Redis URL (see README)
      - key: JWT_SECRET
        generateValue: true   # Render auto-generates a secure secret
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DASHBOARD_URL
        sync: false           # paste your Vercel frontend URL
      - key: API_URL
        sync: false           # paste this service's own Render URL
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_WEBHOOK_SECRET
        sync: false
      - key: INTERNAL_SECRET
        generateValue: true
      - key: WORKER_DEPLOY_QUEUE
        value: nexgenhost-deployments
