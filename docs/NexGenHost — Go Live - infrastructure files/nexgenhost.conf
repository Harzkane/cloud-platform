# =============================================================================
# NexGenHost — Nginx Wildcard Reverse Proxy
# Handles: nexgenhost.ng + *.nexgenhost.ng → Docker containers
#
# Port mapping convention (managed by Go worker):
#   app subdomain → host port 40000–49999
#   Worker writes port mapping to /opt/nexhost-worker/routes.json
#   Nginx reads it via the lua block OR we use a simpler approach:
#   Each app gets a deterministic port from its deployment ID hash.
#
# For MVP: we use a flat-file route map loaded by the Go worker
#          and serve via the dynamic upstream block below.
# =============================================================================

# Port range pool managed by Go worker
# Worker assigns ports 40000–49999 and writes to /opt/nexhost-worker/routes.json

# ── Redirect HTTP → HTTPS everywhere ─────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name naijadevhub.online *.naijadevhub.online;

    # Let's Encrypt ACME challenge (certbot needs this)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main dashboard redirect (apex domain) ─────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name naijadevhub.online;

    ssl_certificate     /etc/letsencrypt/live/naijadevhub.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/naijadevhub.online/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers         "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA256:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA256";
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Redirect apex to the dashboard on Vercel
    return 301 https://cloud-platform-dashboard.vercel.app$request_uri;
}

# ── Wildcard: user app subdomains ────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ~^(?<appname>[a-z0-9-]+)\.naijadevhub\.online$;

    ssl_certificate     /etc/letsencrypt/live/naijadevhub.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/naijadevhub.online/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers         "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA256:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA256";
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Pass the app name to upstream so the Go worker's port-map proxy can resolve it
    # The Go worker runs a tiny HTTP proxy on 127.0.0.1:8080 that reads routes.json
    # and forwards to the correct container port. This keeps Nginx config static.
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-App-Name        $appname;

        # WebSocket support (for live log streaming)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        # Timeouts — apps may be slow to cold-start
        proxy_connect_timeout  30s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        # Buffer tuning
        proxy_buffering          on;
        proxy_buffer_size        16k;
        proxy_buffers            8 16k;
        proxy_busy_buffers_size  32k;
    }

    # Health endpoint injected by NexGenHost (doesn't require app to implement it)
    location /_nexhost/health {
        proxy_pass       http://127.0.0.1:8080/_nexhost/health;
        proxy_set_header X-App-Name $appname;
        access_log off;
    }

    # Log format: combined + app name for debugging
    access_log /var/log/nginx/apps-access.log combined;
    error_log  /var/log/nginx/apps-error.log  warn;
}

