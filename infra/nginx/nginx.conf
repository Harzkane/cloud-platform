user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 50m;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ── API (api.nexgenhost.com) ──────────────────────────
    server {
        listen 80;
        server_name api.nexgenhost.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name api.nexgenhost.com;

        ssl_certificate     /etc/letsencrypt/live/nexgenhost.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/nexgenhost.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Block external access to internal routes
        location /internal {
            deny all;
            return 403;
        }

        location / {
            proxy_pass         http://localhost:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # SSE support (for live deployment logs)
            proxy_buffering    off;
            proxy_read_timeout 3600s;
        }
    }

    # ── Dashboard (nexgenhost.com / app.nexgenhost.com) ───
    server {
        listen 80;
        server_name nexgenhost.com www.nexgenhost.com app.nexgenhost.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name nexgenhost.com www.nexgenhost.com app.nexgenhost.com;

        ssl_certificate     /etc/letsencrypt/live/nexgenhost.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/nexgenhost.com/privkey.pem;

        location / {
            proxy_pass         http://localhost:3001;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ── Wildcard: {project}.nexgenhost.com → deployed apps ─
    server {
        listen 80;
        server_name *.nexgenhost.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name *.nexgenhost.com;

        ssl_certificate     /etc/letsencrypt/live/nexgenhost.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/nexgenhost.com/privkey.pem;

        # Extract subdomain and proxy to the right container port
        # Requires nginx-upstream-dynamic-servers or manual map
        # For MVP: Hono API handles port mapping via /proxy endpoint
        location / {
            proxy_pass         http://localhost:3000/proxy;
            proxy_set_header   X-Host $host;
            proxy_set_header   X-Subdomain $subdomain;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
        }
    }
}
