services:
  postgres:
    image: postgres:16-alpine
    container_name: nexgenhost_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ngx_user
      POSTGRES_PASSWORD: ngx_secret
      POSTGRES_DB: nexgenhost_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ngx_user -d nexgenhost_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexgenhost_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Uncomment to run the API locally in Docker too
  # api:
  #   build: ../../apps/api
  #   container_name: nexgenhost_api
  #   restart: unless-stopped
  #   environment:
  #     DATABASE_URL: postgresql://ngx_user:ngx_secret@postgres:5432/nexgenhost_dev
  #     REDIS_URL: redis://redis:6379
  #     JWT_SECRET: local_dev_secret
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
